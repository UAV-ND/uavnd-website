name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch Git LFS media
        run: |
          git lfs install
          git lfs pull
          echo "Video file sizes:"
          ls -lh public/videos/ src/videos/ 2>/dev/null || true
          for f in public/videos/* src/videos/*; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -q "git-lfs"; then
              echo "ERROR: $f is a Git LFS pointer, not actual media. Run 'git lfs push --all origin' locally."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: CI=false npm run build

      - name: Disable Jekyll
        run: echo > build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


